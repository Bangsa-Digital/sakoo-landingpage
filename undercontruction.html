<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sedang Dalam Perbaikan - Sakoo App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
        :root {
            --sakoo-green-light: #2dde98;
            --sakoo-green-dark: #0d986a;
        }
        .bg-sakoo-gradient {
            background-image: linear-gradient(135deg, var(--sakoo-green-light) 0%, var(--sakoo-green-dark) 100%);
        }
        .text-sakoo-green {
            color: var(--sakoo-green-dark);
        }
        /* Animasi berdenyut halus untuk ikon */
        @keyframes pulse-slow {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.8; transform: scale(1.05); }
        }
        .animate-pulse-slow {
            animation: pulse-slow 3s infinite ease-in-out;
        }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 min-h-screen flex flex-col items-center justify-center p-6">

    <!-- Kontainer Utama -->
    <div class="max-w-lg w-full text-center">
        
        <!-- Logo Sakoo -->
        <div class="mb-8 flex justify-center items-center space-x-2">
            <span class="font-bold text-3xl text-slate-900">Sakoo</span>
        </div>

        <!-- Kartu Maintenance -->
        <div class="bg-white p-8 md:p-12 rounded-2xl shadow-xl shadow-slate-200/50 border border-slate-100">
            
            <!-- Ilustrasi Ikon -->
            <div class="mx-auto mb-8 w-24 h-24 bg-emerald-50 rounded-full flex items-center justify-center animate-pulse-slow">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-12 h-12 text-emerald-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M11 4a2 2 0 114 0v1a1 1 0 001 1h3a1 1 0 011 1v3a1 1 0 01-1 1h-1a2 2 0 100 4h1a1 1 0 011 1v3a1 1 0 01-1 1h-3a1 1 0 01-1-1v-1a2 2 0 10-4 0v1a1 1 0 01-1 1H7a1 1 0 01-1-1v-3a1 1 0 00-1-1H4a2 2 0 110-4h1a1 1 0 001-1V7a1 1 0 011-1h3a1 1 0 001-1V4z" />
                </svg>
            </div>

            <!-- Pesan Utama -->
            <h1 class="text-3xl font-extrabold text-slate-900 mb-4">Kami Sedang Berbenah</h1>
            <p class="text-slate-600 mb-8 leading-relaxed">
                Minkoo dan tim sedang melakukan pemeliharaan sistem untuk meningkatkan performa Sakoo App.
            </p>

            <!-- Status Indicator -->
            <div class="inline-flex items-center px-4 py-2 bg-slate-50 border border-slate-200 rounded-full text-sm text-slate-500">
                <span class="relative flex h-3 w-3 mr-2">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-emerald-500"></span>
                </span>
                Sedang bekerja...
            </div>

        </div>

        <!-- Footer -->
        <p class="mt-8 text-sm text-slate-400">
            &copy; 2025 Sakoo App. Butuh bantuan mendesak? <a href="mailto:support@sakooapp.com" class="text-emerald-600 hover:underline">Hubungi Kami</a>
        </p>

    </div>

</body>
</html>
